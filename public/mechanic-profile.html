<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanic Profile — MechPartner</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="mechanic-profile">
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

        <main class="main-content">
            <div class="page-header animate-fade-in">
                <div style="display: flex; align-items: center;">
                    <button class="btn-back" onclick="history.back()"></button>
                    <div>
                        <h1>Profile Management</h1>
                        <p>Update your shop details and services</p>
                    </div>
                </div>
            </div>

            <div class="profile-grid">
                <!-- Profile Sidebar -->
                <div class="card profile-sidebar animate-fade-in-up">
                    <div class="profile-avatar" id="profileAvatar">M</div>
                    <h2 id="profileName" class="mt-1">Loading...</h2>
                    <p style="color: var(--accent); font-size: 0.9rem;" id="profileShop">—</p>
                    <div class="mt-2" style="text-align: left;">
                        <div class="mechanic-info-item mb-1">
                            <span class="info-icon">📧</span>
                            <span id="profileEmail">—</span>
                        </div>
                        <div class="mechanic-info-item mb-1">
                            <span class="info-icon">📱</span>
                            <span id="profilePhone">—</span>
                        </div>
                    </div>
                    <button class="btn btn-secondary btn-block mt-2" id="updateLocationBtn">📍 Update Location</button>
                </div>

                <!-- Edit Forms -->
                <div>
                    <!-- Shop & Profile Details -->
                    <div class="card mb-2 animate-fade-in-up" style="animation-delay: 0.1s;">
                        <div class="card-header">
                            <h2 class="card-title">Edit Profile & Shop Details</h2>
                        </div>
                        <form id="mechanicProfileForm" enctype="multipart/form-data">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label for="editName">Full Name</label>
                                    <input type="text" class="form-control" id="editName" name="name">
                                </div>
                                <div class="form-group">
                                    <label for="editPhone">Phone Number</label>
                                    <input type="tel" class="form-control" id="editPhone" name="phone">
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label for="editShopName">Garage / Shop Name</label>
                                    <input type="text" class="form-control" id="editShopName" name="shopName">
                                </div>
                                <div class="form-group">
                                    <label for="editServiceArea">Service Area</label>
                                    <input type="text" class="form-control" id="editServiceArea" name="serviceArea">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="editShopAddress">Shop Address</label>
                                <input type="text" class="form-control" id="editShopAddress" name="shopAddress">
                            </div>
                            <div class="form-group">
                                <label for="editServices">Services Offered <span
                                        style="font-weight: 400; text-transform: none;">(comma-separated)</span></label>
                                <input type="text" class="form-control" id="editServices" name="services"
                                    placeholder="e.g., Bike Repair, Car Service, AC Repair">
                            </div>

                            <!-- Document Uploads -->
                            <div
                                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 0.5rem;">
                                <div class="form-group">
                                    <label>Profile Photo</label>
                                    <div class="file-upload" style="padding: 1rem;">
                                        <div class="file-upload-icon">📸</div>
                                        <div class="file-name" id="profilePhotoLabel" style="font-size: 0.75rem;">No
                                            file</div>
                                        <input type="file" name="profilePhoto" id="profilePhoto" accept="image/*">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Aadhar Card</label>
                                    <div class="file-upload" style="padding: 1rem;">
                                        <div class="file-upload-icon">🪪</div>
                                        <div class="file-name" id="aadharCardLabel" style="font-size: 0.75rem;">No file
                                        </div>
                                        <input type="file" name="aadharCard" id="aadharCard" accept="image/*">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>PAN Card</label>
                                    <div class="file-upload" style="padding: 1rem;">
                                        <div class="file-upload-icon">💳</div>
                                        <div class="file-name" id="panCardLabel" style="font-size: 0.75rem;">No file
                                        </div>
                                        <input type="file" name="panCard" id="panCard" accept="image/*">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Driving License</label>
                                    <div class="file-upload" style="padding: 1rem;">
                                        <div class="file-upload-icon">🚗</div>
                                        <div class="file-name" id="drivingLicenseLabel" style="font-size: 0.75rem;">No
                                            file</div>
                                        <input type="file" name="drivingLicense" id="drivingLicense" accept="image/*">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Shop Picture</label>
                                    <div class="file-upload" style="padding: 1rem;">
                                        <div class="file-upload-icon">🏪</div>
                                        <div class="file-name" id="shopImageLabel" style="font-size: 0.75rem;">No file
                                        </div>
                                        <input type="file" name="shopImage" id="shopImage" accept="image/*">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary mt-1">Save Changes</button>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="card animate-fade-in-up" style="animation-delay: 0.2s;">
                        <div class="card-header">
                            <h2 class="card-title">Change Password</h2>
                        </div>
                        <form id="passwordForm">
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label for="newPassword">New Password</label>
                                    <input type="password" class="form-control" id="newPassword" required minlength="6">
                                </div>
                                <div class="form-group">
                                    <label for="confirmPassword">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" required
                                        minlength="6">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-secondary">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/mechanic.js"></script>
</body>

</html>
