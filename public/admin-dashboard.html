<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard — Manage Mechanics in MechPartner.">
    <title>Admin Dashboard — MechPartner</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mechanic-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .mechanic-table th,
        .mechanic-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .mechanic-table th {
            background: var(--bg-dark);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .mechanic-table tr:last-child td { border-bottom: none; }
        .mechanic-table tr:hover td { background: rgba(255,255,255,0.03); }

        /* Status badges */
        .status-badge {
            padding: 0.3rem 0.65rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }
        .status-active   { background: var(--success-bg); color: var(--success); }
        .status-banned   { background: var(--danger-bg);  color: var(--danger);  }

        /* Verification badges */
        .verify-badge {
            padding: 0.3rem 0.65rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }
        .verify-verified   { background: rgba(16,185,129,0.15);  color: #10b981; }
        .verify-pending    { background: rgba(234,179,8,0.15);    color: #eab308; }
        .verify-unverified { background: rgba(239,68,68,0.15);    color: #ef4444; border: 1.5px solid rgba(239,68,68,0.35); }

        /* Filter bar */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .filter-bar label { font-size: 0.85rem; color: var(--text-secondary); }
        .filter-select {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .stat-val {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-total     .stat-val { color: var(--primary); }
        .stat-verified  .stat-val { color: #10b981; }
        .stat-pending   .stat-val { color: #eab308; }
        .stat-unverified .stat-val { color: #ef4444; }

        /* Unauthorized warning */
        .unauthorized-row td { background: rgba(239,68,68,0.05) !important; }

        .mismatch-tip {
            font-size: 0.72rem;
            color: var(--text-muted);
            display: block;
            margin-top: 0.2rem;
        }
    </style>
</head>

<body data-page="admin">
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <div style="display: flex; align-items: center;">
                    <button class="btn-back" onclick="history.back()"></button>
                    <div>
                        <h1>Admin Dashboard</h1>
                        <p>Manage Mechanics and Verification Status</p>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="btn btn-outline" title="Toggle Theme">🌓 Toggle Theme</button>
            </div>

            <!-- Stats cards -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card stat-total">
                    <div class="stat-val" id="statTotal">–</div>
                    <div class="stat-label">Total Mechanics</div>
                </div>
                <div class="stat-card stat-verified">
                    <div class="stat-val" id="statVerified">–</div>
                    <div class="stat-label">✅ Verified</div>
                </div>
                <div class="stat-card stat-pending">
                    <div class="stat-val" id="statPending">–</div>
                    <div class="stat-label">🟡 Pending</div>
                </div>
                <div class="stat-card stat-unverified">
                    <div class="stat-val" id="statUnverified">–</div>
                    <div class="stat-label">🔴 Unauthorized</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Registered Mechanics</h2>
                    <div class="filter-bar">
                        <label for="verifyFilter">Filter:</label>
                        <select class="filter-select" id="verifyFilter">
                            <option value="all">All</option>
                            <option value="verified">✅ Verified</option>
                            <option value="pending">🟡 Pending</option>
                            <option value="unverified">🔴 Unauthorized</option>
                        </select>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="mechanic-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Shop Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Account</th>
                                <th>Verification</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="mechanicList">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 2rem;">Loading mechanics...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile toggle -->
    <button class="btn btn-primary" onclick="toggleSidebar()"
        style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; border-radius: 50%; width: 50px; height: 50px; padding: 0; box-shadow: var(--shadow-lg); display: flex; align-items: center; justify-content: center;"
        id="mobileToggle">
        <span>☰</span>
    </button>

    <script src="js/common.js"></script>
    <script>
        let allMechanics = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth('admin')) return;
            injectSidebar('admin');
            setActiveNav('nav-admin-dashboard');

            if (window.innerWidth > 768) {
                document.getElementById('mobileToggle').style.display = 'none';
            }

            loadMechanics();

            document.getElementById('verifyFilter').addEventListener('change', renderTable);
        });

        async function loadMechanics() {
            const list = document.getElementById('mechanicList');
            try {
                allMechanics = await apiRequest('/admin/mechanics');

                // Stats
                document.getElementById('statTotal').textContent     = allMechanics.length;
                document.getElementById('statVerified').textContent  = allMechanics.filter(m => m.verificationStatus === 'verified').length;
                document.getElementById('statPending').textContent   = allMechanics.filter(m => m.verificationStatus === 'pending' || !m.verificationStatus).length;
                document.getElementById('statUnverified').textContent= allMechanics.filter(m => m.verificationStatus === 'unverified').length;

                renderTable();
            } catch (error) {
                list.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:2rem;">Error loading mechanics: ${error.message}</td></tr>`;
            }
        }

        function renderTable() {
            const list   = document.getElementById('mechanicList');
            const filter = document.getElementById('verifyFilter').value;

            let mechanics = allMechanics;
            if (filter !== 'all') {
                if (filter === 'pending') {
                    mechanics = mechanics.filter(m => m.verificationStatus === 'pending' || !m.verificationStatus);
                } else {
                    mechanics = mechanics.filter(m => m.verificationStatus === filter);
                }
            }

            if (!mechanics || mechanics.length === 0) {
                list.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">No mechanics found.</td></tr>';
                return;
            }

            list.innerHTML = mechanics.map(mech => {
                const vs = mech.verificationStatus || 'pending';

                // Verification badge
                let vBadge = '';
                if (vs === 'verified') {
                    vBadge = `<span class="verify-badge verify-verified">✅ Verified</span>`;
                } else if (vs === 'unverified') {
                    const reason = mech.verificationData?.mismatchReason || 'Identity mismatch';
                    vBadge = `
                        <span class="verify-badge verify-unverified">🔴 Unauthorized</span>
                        <span class="mismatch-tip" title="${reason}">⚠️ ${reason.slice(0,50)}${reason.length>50?'…':''}</span>`;
                } else {
                    vBadge = `<span class="verify-badge verify-pending">🟡 Pending</span>`;
                }

                const rowClass = vs === 'unverified' ? 'unauthorized-row' : '';

                return `
                    <tr class="${rowClass}">
                        <td style="font-weight: 600;">
                            ${vs === 'unverified' ? '🔴 ' : ''}${mech.name}
                        </td>
                        <td>${mech.shopName || '–'}</td>
                        <td>${mech.email}</td>
                        <td>${mech.phone}</td>
                        <td>
                            <span class="status-badge ${mech.isBanned ? 'status-banned' : 'status-active'}">
                                ${mech.isBanned ? '🚫 Banned' : '✓ Active'}
                            </span>
                        </td>
                        <td>${vBadge}</td>
                        <td>
                            <button onclick="toggleBan('${mech._id}', ${mech.isBanned})"
                                class="btn btn-sm ${mech.isBanned ? 'btn-success' : 'btn-danger'}">
                                ${mech.isBanned ? 'Unban' : 'Ban'}
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function toggleBan(id, currentStatus) {
            const action = currentStatus ? 'unban' : 'ban';
            if (!confirm(`Are you sure you want to ${action} this mechanic?`)) return;
            try {
                await apiRequest(`/admin/mechanics/${id}/ban`, { method: 'PUT' });
                showToast(`Mechanic successfully ${action}ned.`, 'success');
                loadMechanics();
            } catch (error) {
                showToast(`Failed to ${action} mechanic: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
