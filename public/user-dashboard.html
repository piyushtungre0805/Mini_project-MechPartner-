<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — MechPartner</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="user-dashboard">
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

        <main class="main-content">
            <div class="page-header animate-fade-in">
                <div style="display: flex; align-items: center;">
                    <button class="btn-back" onclick="history.back()"></button>
                    <div>
                        <h1>Welcome, <span id="welcomeName">User</span> 👋</h1>
                        <p>Here's an overview of your account</p>
                    </div>
                </div>
                <a href="search-mechanics.html" class="btn btn-primary">🔍 Find Mechanics</a>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon accent">📋</div>
                    <div class="stat-info">
                        <h3 id="totalRequests">0</h3>
                        <p>Total Requests</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon warning">⏳</div>
                    <div class="stat-info">
                        <h3 id="pendingRequests">0</h3>
                        <p>Pending</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon success">✅</div>
                    <div class="stat-info">
                        <h3 id="completedRequests">0</h3>
                        <p>Completed</p>
                    </div>
                </div>
            </div>

            <!-- Recent Requests -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Recent Service Requests</h2>
                    <a href="service-history.html" class="btn btn-secondary btn-sm">View All</a>
                </div>
                <div id="recentRequests">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/bot.js"></script>
    <script src="js/user.js"></script>
</body>

</html>
